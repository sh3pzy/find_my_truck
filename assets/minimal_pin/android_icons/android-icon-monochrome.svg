  <path d="M512 100 C350 100 220 230 220 400 C220 580 512 900 512 900 C512 900 804 580 804 400 C804 230 674 100 512 100Z" fill="white"/>

  <!-- Circle cutout in pin (slightly smaller to keep pin ring visible) -->
