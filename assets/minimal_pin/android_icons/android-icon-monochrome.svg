  <rect x="360" y="358" width="304" height="24" fill="white" opacity="0.6"/>

  <!-- Window openings — cut darker to show window -->
  <rect x="372" y="350" width="130" height="96" rx="10" fill="white" opacity="0.35"/>
  <rect x="514" y="356" width="136" height="78" rx="8" fill="white" opacity="0.35"/>

  <!-- Exhaust stack -->
  <rect x="628" y="296" width="30" height="78" rx="6" fill="white" opacity="0.9"/>

  <!-- Undercarriage -->
  <rect x="360" y="490" width="304" height="30" rx="6" fill="white" opacity="0.9"/>

  <!-- Wheels -->
  <circle cx="424" cy="510" r="36" fill="white" opacity="0.9"/>
  <circle cx="424" cy="510" r="16" fill="white" opacity="0.3"/>
  <circle cx="592" cy="510" r="36" fill="white" opacity="0.9"/>
  <circle cx="592" cy="510" r="16" fill="white" opacity="0.3"/>
</svg>
